version: "3.8"

networks:
  control-net:
    driver: bridge
  execution-net:
    driver: bridge
  telemetry-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  # --- Control Plane Databases & Storage ---
  postgres:
    image: postgres:16
    container_name: opspilot-postgres-prod
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opspilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - control-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: opspilot-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - control-net
      - execution-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-39-38Z
    container_name: opspilot-minio-prod
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - control-net
      - execution-net

  # --- Telemetry Storage ---
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: opspilot-prometheus
    ports:
      - "9090:9090"
    networks:
      - telemetry-net

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: opspilot-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - telemetry-net
      - execution-net

  otel-collector:
    image: otel/opentelemetry-collector:0.101.0
    container_name: opspilot-otel-collector
    volumes:
      - ./infrastructure/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4318:4318" # OTLP HTTP receiver
    networks:
      - telemetry-net
      - execution-net
    depends_on:
      - jaeger

  # --- Apps & Workers (using Node container mounting monorepo) ---
  control-api:
    image: node:20
    container_name: opspilot-control-api
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/opspilot?schema=public
      - REDIS_URL=redis://redis:6379/0
      - PORT=4000
    command: pnpm --filter @opspilot/control-api start
    networks:
      - control-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:20
    container_name: opspilot-web
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    environment:
      - CLIENT_URL=http://localhost:3000
      - PORT=3000
    command: pnpm --filter @opspilot/web start
    networks:
      - control-net
    depends_on:
      - control-api

  # --- Intelligence Workers ---
  discovery-worker:
    image: node:20
    container_name: opspilot-discovery-worker
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/opspilot?schema=public
      - REDIS_URL=redis://redis:6379/0
    command: pnpm --filter @opspilot/discovery-worker start
    networks:
      - control-net
      - execution-net
    depends_on:
      - redis

  indexer-worker:
    image: node:20
    container_name: opspilot-indexer-worker
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/opspilot?schema=public
      - REDIS_URL=redis://redis:6379/0
    command: pnpm --filter @opspilot/indexer-worker start
    networks:
      - control-net
      - execution-net
    depends_on:
      - redis

  graph-worker:
    image: node:20
    container_name: opspilot-graph-worker
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/opspilot?schema=public
      - REDIS_URL=redis://redis:6379/0
    command: pnpm --filter @opspilot/graph-worker start
    networks:
      - control-net
      - execution-net
    depends_on:
      - redis

  agent-worker:
    image: node:20
    container_name: opspilot-agent-worker
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/opspilot?schema=public
      - REDIS_URL=redis://redis:6379/0
    command: pnpm --filter @opspilot/agent-worker start
    networks:
      - control-net
      - execution-net
    depends_on:
      - redis

  evaluation-worker:
    image: node:20
    container_name: opspilot-evaluation-worker
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/opspilot?schema=public
      - REDIS_URL=redis://redis:6379/0
    command: pnpm --filter @opspilot/evaluation-worker start
    networks:
      - control-net
      - execution-net
    depends_on:
      - redis

  # --- Isolated Execution Plane ---
  sandbox-controller:
    image: node:20
    container_name: opspilot-sandbox-controller
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "4004:4004"
    command: pnpm --filter @opspilot/sandbox-controller start
    networks:
      - execution-net

  # --- Telemetry Apps & Incident Worker ---
  telemetry-api:
    image: node:20
    container_name: opspilot-telemetry-api
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "4005:4005"
    command: pnpm --filter @opspilot/telemetry-api start
    networks:
      - telemetry-net

  incident-worker:
    image: node:20
    container_name: opspilot-incident-worker
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "4006:4006"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/opspilot?schema=public
      - REDIS_URL=redis://redis:6379/0
    command: pnpm --filter @opspilot/incident-worker start
    networks:
      - telemetry-net
      - control-net
    depends_on:
      - redis
